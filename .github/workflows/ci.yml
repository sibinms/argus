name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # CodeQL catches vulnerability patterns that land in its database after
    # a commit merges, so it also runs weekly outside of any push/PR.
    - cron: "0 3 * * 1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests eval scripts
      - name: Ruff format check
        run: ruff format --check src tests eval scripts
      - name: Check README version references
        run: python scripts/check_readme_version.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Bandit (static analysis)
        run: bandit -r src
      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --skip-editable

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  eval:
    # Informational, not a gate: LLM output is non-deterministic, so a hard
    # recall threshold here would be flaky. This exists so a prompt/lens
    # change is always accompanied by an actual recall number in the PR,
    # instead of "unverified" being the answer every time (see PR #5).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run recall eval against seed bugs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARGUS_EVAL_LENS_MODEL: deepseek/deepseek-v4-flash
          ARGUS_EVAL_CURATOR_MODEL: deepseek/deepseek-v4-pro
        run: python eval/run_eval.py
