name: Argus review

# Dogfooding: Argus reviews pull requests on its own repo.
# Fires on any PR (feature -> develop, develop -> main, etc.).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Provider key for the models in .argus/config.yml. Set at job level so
    # it's inherited by the composite action's steps. Using Gemini (free
    # tier) here; for another provider, set that provider's key instead
    # (OPENAI_API_KEY, ANTHROPIC_API_KEY, ...) and switch the config models.
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      # This repo's PRs *are* changes to Argus, so we review each PR with the
      # code in that PR (the local ./ action) rather than the last release.
      # Requires a checkout first so ./action.yml is present.
      - uses: actions/checkout@v4
      - uses: ./
