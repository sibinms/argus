name: Argus review

# Dogfooding: Argus reviews pull requests on its own repo.
# Fires on any PR (feature -> develop, develop -> main, etc.).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Provider key for the models in .argus/config.yml. Set at job level so
    # it's inherited by the composite action's steps. Using OpenAI here;
    # for Anthropic, set ANTHROPIC_API_KEY instead (or pass it via the
    # action's `with: anthropic-api-key`) and switch the models in the config.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      # Pinned to the released tag. Switch to @main (or a local `./` action)
      # if you want a PR reviewed by in-development Argus rather than the
      # last release.
      - uses: sibinms/argus@v1.2.3
