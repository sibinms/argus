# Argus reviewing its own PRs. See .argus/config.yml.example for all options.

# active: posts inline comments + a verdict on the PR (what we want here).
# Switch to shadow to get a job-summary report without commenting.
mode: active

# Gemini free tier (matches the GEMINI_API_KEY passed by the workflow).
# Both on flash to stay comfortably inside free-tier limits while dogfooding;
# bump the curator to gemini/gemini-3.1-pro-preview for stronger judgment if
# your tier allows. To use another provider, change these model strings and
# pass that provider's key via the workflow's env: block instead.
#
# Google deprecates Gemini model names on its own schedule (sometimes ahead
# of the announced date) — if these start 404ing, check
# https://ai.google.dev/gemini-api/docs/deprecations for the current list.
models:
  lens: gemini/gemini-3.5-flash
  curator: gemini/gemini-3.5-flash

lenses:
  - security
  - tests
  - error_handling
  - contracts
  - correctness
  - deleted_code
  - reuse
  - efficiency

context:
  ignore_globs:
    - "*.lock"
    - "*.min.js"
    - "*/migrations/*"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    # Eval fixtures are intentionally-buggy synthetic examples (that's the
    # point of them) — without this, Argus reviews its own test data as if
    # it were real application code and flags the deliberate bug in it.
    - "eval/seed_bugs/*"

posting:
  min_confidence: medium
  show_dropped_reasoning: true
  # We enabled "Allow GitHub Actions to approve pull requests" on this repo,
  # so Argus posts a real Approved review on a clean PR.
  approve_reviews: true
