# Argus reviewing its own PRs. See .argus/config.yml.example for all options.

# active: posts inline comments + a verdict on the PR (what we want here).
# Switch to shadow to get a job-summary report without commenting.
mode: active

# Anthropic by default (matches the workflow's anthropic-api-key input).
# To use another provider, change these model strings and pass that
# provider's key via the workflow's env: block instead.
# Curator runs on the stronger model since judgment is where it pays off;
# drop it to claude-haiku-4-5 too if you want to cut cost while dogfooding.
models:
  lens: claude-haiku-4-5
  curator: claude-opus-4-8

lenses:
  - security
  - tests
  - error_handling
  - contracts

posting:
  min_confidence: medium
  show_dropped_reasoning: true
