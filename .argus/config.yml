# Argus reviewing its own PRs. See .argus/config.yml.example for all options.

# active: posts inline comments + a verdict on the PR (what we want here).
# Switch to shadow to get a job-summary report without commenting.
mode: active

# DeepSeek (matches the DEEPSEEK_API_KEY passed by the workflow). Switched
# off Gemini's free tier, which 429/503'd under this repo's own parallel
# -lens load (the planner + 8 lenses + curator fire up to ~10 concurrent
# calls per run) — a paid key gets a real rate limit instead of a free-tier
# trickle, and DeepSeek is cheap enough that this barely matters on cost.
# Flash for the lens (cheap, over-report), Pro for the curator (stronger
# judgment). To use another provider, change these model strings and pass
# that provider's key via the workflow's env: block instead.
models:
  lens: deepseek/deepseek-v4-flash
  curator: deepseek/deepseek-v4-pro

lenses:
  - security
  - tests
  - error_handling
  - contracts
  - correctness
  - deleted_code
  - reuse
  - efficiency

context:
  ignore_globs:
    - "*.lock"
    - "*.min.js"
    - "*/migrations/*"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    # Eval fixtures are intentionally-buggy synthetic examples (that's the
    # point of them) — without this, Argus reviews its own test data as if
    # it were real application code and flags the deliberate bug in it.
    - "eval/seed_bugs/*"

posting:
  min_confidence: medium
  show_dropped_reasoning: true
  # We enabled "Allow GitHub Actions to approve pull requests" on this repo,
  # so Argus posts a real Approved review on a clean PR.
  approve_reviews: true
