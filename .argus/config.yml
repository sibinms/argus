# Argus reviewing its own PRs. See .argus/config.yml.example for all options.

# active: posts inline comments + a verdict on the PR (what we want here).
# Switch to shadow to get a job-summary report without commenting.
mode: active

# Gemini free tier (matches the GEMINI_API_KEY passed by the workflow).
# Both on flash to stay comfortably inside free-tier limits while dogfooding;
# bump the curator to gemini/gemini-2.5-pro for stronger judgment if your
# tier allows. To use another provider, change these model strings and pass
# that provider's key via the workflow's env: block instead.
models:
  lens: gemini/gemini-2.0-flash
  curator: gemini/gemini-2.5-flash

lenses:
  - security
  - tests
  - error_handling
  - contracts

posting:
  min_confidence: medium
  show_dropped_reasoning: true
