name: "Argus PR Review"
description: "Reviews pull requests with a panel of narrow lenses and a citation-checked curator"
branding:
  icon: "eye"
  color: "purple"

inputs:
  anthropic-api-key:
    description: >
      Optional. Sets ANTHROPIC_API_KEY for this step. Kept for backward
      compatibility with the default Anthropic models — if your
      .argus/config.yml uses a different provider (OpenAI, Gemini, ...),
      skip this input and set that provider's own key via this step's
      own `env:` block instead (e.g. OPENAI_API_KEY).
    required: false
    default: ""
  github-token:
    description: "Token used to read the PR and, in active mode, post comments"
    required: false
    default: ${{ github.token }}
  mode:
    description: "shadow or active; overrides .argus/config.yml when set"
    required: false
    default: ""
  lens-model:
    description: >
      Model for the lenses — any string litellm supports (e.g. gpt-4o-mini,
      gemini/gemini-2.5-flash). Overrides models.lens from .argus/config.yml.
      Lets you pick a model without committing a config file.
    required: false
    default: ""
  curator-model:
    description: >
      Model for the curator — any string litellm supports (e.g. gpt-4o,
      claude-opus-4-8). Overrides models.curator from .argus/config.yml.
    required: false
    default: ""
  pr:
    description: >
      PR number to review. Auto-detected from the GitHub event when omitted.
      Set this when triggering from an issue_comment event, where the PR
      number is not present in the event payload.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Argus
      shell: bash
      working-directory: ${{ github.action_path }}
      run: pip install .

    - name: Run review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ARGUS_MODE: ${{ inputs.mode }}
        ARGUS_LENS_MODEL: ${{ inputs.lens-model }}
        ARGUS_CURATOR_MODEL: ${{ inputs.curator-model }}
        ARGUS_ANTHROPIC_API_KEY_INPUT: ${{ inputs.anthropic-api-key }}
        ARGUS_PR_INPUT: ${{ inputs.pr }}
      run: |
        # Only export from the input if it was actually given, so this never
        # clobbers a provider key you set directly on this step's own env:
        # block (the way to use non-Anthropic models).
        if [ -n "$ARGUS_ANTHROPIC_API_KEY_INPUT" ]; then
          export ANTHROPIC_API_KEY="$ARGUS_ANTHROPIC_API_KEY_INPUT"
        fi

        args=(--github)
        if [ -n "$ARGUS_PR_INPUT" ]; then
          args+=(--pr "$ARGUS_PR_INPUT")
        fi
        if [ -n "$ARGUS_MODE" ]; then
          args+=(--mode "$ARGUS_MODE")
        fi
        if [ -n "$ARGUS_LENS_MODEL" ]; then
          args+=(--lens-model "$ARGUS_LENS_MODEL")
        fi
        if [ -n "$ARGUS_CURATOR_MODEL" ]; then
          args+=(--curator-model "$ARGUS_CURATOR_MODEL")
        fi
        argus review "${args[@]}"
