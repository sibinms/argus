  <!-- wordmark + tagline -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="520" y="310" font-size="104" font-weight="700">Argus</text>
    <text x="524" y="368" font-size="30" fill="#e9e5ff">An AI PR reviewer built from many narrow</text>
    <text x="524" y="406" font-size="30" fill="#e9e5ff">lenses and one careful, evidence-checked curator.</text>
