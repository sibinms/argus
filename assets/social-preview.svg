      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- logo, scaled and positioned left of center -->
  <g transform="translate(24,104) scale(1.8)">
    <path d="M120 40 L182 62 V116 C182 158 156 188 120 202 C84 188 58 158 58 116 V62 Z"
