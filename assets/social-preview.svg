      <ellipse cx="86" cy="132" rx="13" ry="9"/>
      <ellipse cx="154" cy="132" rx="13" ry="9"/>
      <ellipse cx="98" cy="160" rx="10" ry="7"/>
      <ellipse cx="142" cy="160" rx="10" ry="7"/>
