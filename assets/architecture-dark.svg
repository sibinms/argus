      <circle cx="318" cy="96" r="9" fill="none" stroke="#8f83ff" stroke-width="1.6"/><circle cx="318" cy="96" r="3.4" fill="#8f83ff"/>
      <text x="338" y="101" fill="#eceaf3">Security</text>
    </g>
    <g>
      <rect x="292" y="142" width="196" height="48" rx="11" fill="#211f39" stroke="#8f83ff" stroke-opacity="0.5"/>
      <circle cx="318" cy="166" r="9" fill="none" stroke="#8f83ff" stroke-width="1.6"/><circle cx="318" cy="166" r="3.4" fill="#8f83ff"/>
      <text x="338" y="171" fill="#eceaf3">Tests</text>
    </g>
    <g>
      <rect x="292" y="211" width="196" height="48" rx="11" fill="#211f39" stroke="#8f83ff" stroke-opacity="0.5"/>
      <circle cx="318" cy="235" r="9" fill="none" stroke="#8f83ff" stroke-width="1.6"/><circle cx="318" cy="235" r="3.4" fill="#8f83ff"/>
      <text x="338" y="240" fill="#eceaf3">Error handling</text>
