    <circle cx="66" cy="224" r="4.5" fill="url(#grad)"/><circle cx="66" cy="250" r="4.5" fill="url(#grad)"/>
    <path d="M66 228 v18" stroke="url(#grad)" stroke-width="2" fill="none"/>
    <text x="86" y="228" font-size="14" font-weight="650" fill="#eceaf3">Pull Request</text>
    <text x="86" y="248" font-size="10.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#a09bb0">diff · files · intent</text>
