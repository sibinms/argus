    <rect x="924" y="300" width="128" height="40" rx="10" fill="#2c1717" stroke="#f87171" stroke-opacity="0.55"/>
    <text x="944" y="325" fill="#f87171">✗ Changes</text>
  </g>

  <text x="530" y="442" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#a09bb0" text-anchor="middle">posted as one GitHub review · any provider via litellm (Anthropic · OpenAI · Gemini · OpenRouter)</text>
