    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a09bb0"/>
    </marker>
  </defs>

  <g fill="none" stroke="#a09bb0" stroke-width="1.6" marker-end="url(#arrow)">
    <path d="M196 235 C240 235, 250 96, 292 96"/>
    <path d="M196 235 C240 235, 250 166, 292 166"/>
    <path d="M196 235 C245 235, 260 235, 292 235"/>
    <path d="M196 235 C240 235, 250 304, 292 304"/>
    <path d="M196 235 C240 235, 250 374, 292 374"/>
    <path d="M488 96 C560 96, 560 210, 636 210"/>
