      <circle cx="318" cy="304" r="9" fill="none" stroke="#8f83ff" stroke-width="1.6"/><circle cx="318" cy="304" r="3.4" fill="#8f83ff"/>
      <text x="338" y="309" fill="#eceaf3">Contracts</text>
    </g>
    <g>
      <rect x="292" y="350" width="196" height="48" rx="11" fill="#201d2a" stroke="#4a4658" stroke-dasharray="4 4"/>
      <circle cx="318" cy="374" r="9" fill="none" stroke="#a09bb0" stroke-width="1.6"/><circle cx="318" cy="374" r="3.4" fill="#a09bb0"/>
      <text x="338" y="379" fill="#a09bb0">…your own (Markdown)</text>
